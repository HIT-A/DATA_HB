name: Course Sync

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check PAT wiring
        run: |
          if [ -z "${{ secrets.PAT }}" ]; then
            echo "PAT is EMPTY"
            exit 1
          else
            echo "PAT is SET"
          fi

      - name: Trigger repos-management workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            console.log("Token exists:", !!process.env.INPUT_GITHUB_TOKEN);
            if (!process.env.INPUT_GITHUB_TOKEN) {
              core.setFailed("PAT secret was not passed into github-token");
              return;
            }

            await github.rest.actions.createWorkflowDispatch({
              owner: 'HIT-A',
              repo: 'repos-management',
              workflow_id: 'course_harbin.yml',
              ref: 'main'
            })
