name: Course Sync

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check PAT wiring
        run: |
          if [ -z "${{ secrets.PAT }}" ]; then
            echo "PAT is EMPTY"
            exit 1
          else
            echo "PAT is SET"
          fi

      - name: Trigger repos-management workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const owner = 'HIT-A';
            const repo = 'repos-management';
            const workflow_id = 'course_harbin.yml';

            core.info(`Actor: ${context.actor}`);
            core.info(`Attempt dispatch target: ${owner}/${repo}/${workflow_id}`);

            try {
              // Real permission probe with the provided github-token.
              const wf = await github.rest.actions.getWorkflow({ owner, repo, workflow_id });
              core.info(`Workflow probe OK: id=${wf.data.id}, state=${wf.data.state}`);

              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id,
                ref: 'main'
              });
              core.info('Dispatch sent successfully.');
            } catch (e) {
              core.setFailed(`Dispatch failed: status=${e.status || 'unknown'} message=${e.message}`);
            }
